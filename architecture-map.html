<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architecture Intelligence | Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #050505;
        --panel-bg: rgba(15, 15, 15, 0.9);
        --border-color: rgba(255, 255, 255, 0.1);
        --accent-primary: #00f2ff;
        --accent-secondary: #7000ff;
        --accent-danger: #ff2e63;
        --accent-warning: #ffb800;
        --accent-success: #00ff88;
        --text-main: #e0e0e0;
        --text-muted: #888888;
        --glass-blur: blur(20px);
        --neon-glow: 0 0 20px rgba(0, 242, 255, 0.4);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: "Inter", sans-serif;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      /* --- UI Layers --- */
      #viewport {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        cursor: grab;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(20, 20, 35, 1) 0%,
          rgba(5, 5, 5, 1) 100%
        );
      }

      #viewport:active {
        cursor: grabbing;
      }

      canvas#particle-layer {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 2;
      }

      #svg-layer {
        position: absolute;
        width: 5000px;
        height: 5000px;
        transform-origin: 0 0;
        z-index: 3;
      }

      /* --- HUD Elements --- */
      .hud {
        position: fixed;
        z-index: 100;
        pointer-events: none;
      }

      .hud * {
        pointer-events: auto;
      }

      .top-bar {
        top: 0;
        left: 0;
        width: 100%;
        padding: 25px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
      }

      .system-status {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .status-badge {
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 8px;
        color: #fff;
      }

      .status-pulse {
        width: 8px;
        height: 8px;
        background: var(--accent-success);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--accent-success);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(1.4);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .command-palette {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        padding: 12px 24px;
        border-radius: 12px;
        color: var(--text-muted);
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        backdrop-filter: var(--glass-blur);
        width: 400px;
        transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        cursor: pointer;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      }

      .command-palette:hover {
        border-color: var(--accent-primary);
        box-shadow: var(--neon-glow);
        transform: translateY(-2px);
      }

      /* --- Navigation Sidebar --- */
      .sidebar {
        left: 30px;
        top: 50%;
        transform: translateY(-50%);
        width: 70px;
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        gap: 25px;
        padding: 30px 0;
        align-items: center;
        backdrop-filter: var(--glass-blur);
        box-shadow: 20px 0 60px rgba(0, 0, 0, 0.5);
      }

      .nav-item {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
        color: var(--text-muted);
        position: relative;
      }

      .nav-item:hover,
      .nav-item.active {
        color: var(--accent-primary);
        background: rgba(0, 242, 255, 0.1);
        box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
      }

      .nav-item[data-tooltip]::after {
        content: attr(data-tooltip);
        position: absolute;
        left: 70px;
        background: #111;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        border: 1px solid var(--border-color);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      }

      .nav-item:hover::after {
        opacity: 1;
        left: 80px;
      }

      /* --- Inspection Panel --- */
      .inspect-panel {
        right: 0;
        top: 0;
        height: 100vh;
        width: 500px;
        background: rgba(10, 10, 15, 0.98);
        border-left: 1px solid var(--border-color);
        transform: translateX(100%);
        backdrop-filter: blur(50px);
        padding: 50px;
        overflow-y: auto;
        transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        box-shadow: -30px 0 80px rgba(0, 0, 0, 0.8);
      }

      .inspect-panel.open {
        transform: translateX(0);
      }

      .panel-section {
        margin-bottom: 40px;
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .metric-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .metric-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        padding: 20px;
        border-radius: 16px;
        position: relative;
        transition: border-color 0.3s;
      }

      .metric-card:hover {
        border-color: var(--accent-primary);
      }

      .metric-card label {
        display: block;
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }

      .metric-card span {
        font-family: "JetBrains Mono", monospace;
        font-size: 24px;
        font-weight: 700;
        color: var(--accent-primary);
      }

      /* --- Flow Visualizer --- */
      .flow-monitor {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 20px;
        border: 1px solid var(--border-color);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
      }

      .flow-step {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .flow-step:last-child {
        border: none;
      }

      .flow-status {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      /* --- SVG Graph --- */
      .node {
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      }

      .node:hover {
        transform: translateY(-5px);
      }

      .node rect {
        fill: rgba(20, 20, 30, 0.95);
        stroke: var(--border-color);
        stroke-width: 2;
        rx: 20;
        transition:
          stroke 0.3s,
          stroke-width 0.3s;
      }

      .node.active rect {
        stroke: var(--accent-primary);
        stroke-width: 4;
        fill: rgba(0, 242, 255, 0.05);
      }

      .node.error rect {
        stroke: var(--accent-danger);
        stroke-dasharray: 8, 4;
        animation: borderPulse 2s infinite;
      }

      @keyframes borderPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .edge {
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 2;
        fill: none;
        transition: all 0.4s;
      }

      .edge.highlight {
        stroke: var(--accent-primary);
        stroke-width: 5;
        filter: drop-shadow(0 0 10px var(--accent-primary));
      }

      .edge.fallback {
        stroke: var(--accent-secondary);
        stroke-dasharray: 10, 5;
      }

      /* --- Mode Overlays --- */
      .mode-label {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        padding: 10px 30px;
        border-radius: 40px;
        backdrop-filter: var(--glass-blur);
        display: flex;
        gap: 20px;
        z-index: 1000;
      }

      .mode-btn {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 20px;
        transition: 0.3s;
      }

      .mode-btn.active {
        color: #fff;
        background: var(--accent-primary);
        box-shadow: var(--neon-glow);
      }
    </style>
  </head>
  <body>
    <div id="viewport">
      <canvas id="particle-layer"></canvas>
      <svg id="svg-layer" viewBox="0 0 5000 5000">
        <defs>
          <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
          </filter>
          <marker
            id="arrow"
            markerWidth="10"
            markerHeight="7"
            refX="10"
            refY="3.5"
            orient="auto"
          >
            <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,255,255,0.2)" />
          </marker>
        </defs>
        <g id="base-grid"></g>
        <g id="edges"></g>
        <g id="nodes"></g>
      </svg>
    </div>

    <!-- HUD -->
    <div class="hud top-bar">
      <div class="system-status">
        <div
          style="
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: #fff;
          "
        >
          DEVB<span style="color: var(--accent-primary)">RAND</span>
          <span style="font-weight: 200; opacity: 0.5">ARCHITECT</span>
        </div>
        <div class="status-badge">
          <div class="status-pulse"></div>
          Mesh Operational
        </div>
      </div>

      <div class="command-palette">
        <i data-lucide="search" style="width: 18px"></i>
        <span>Search nodes, workflows, or traces...</span>
        <span style="margin-left: auto; opacity: 0.4; font-size: 11px"
          >⌘ K</span
        >
      </div>

      <div style="display: flex; gap: 15px">
        <div
          class="status-badge"
          style="
            background: rgba(255, 46, 99, 0.1);
            color: var(--accent-danger);
            border-color: rgba(255, 46, 99, 0.2);
          "
        >
          <i data-lucide="shield-alert" style="width: 14px"></i>
          3 Incidents
        </div>
        <div
          class="status-badge"
          style="
            cursor: pointer;
            background: rgba(0, 242, 255, 0.1);
            border-color: rgba(0, 242, 255, 0.3);
          "
        >
          <i data-lucide="user" style="width: 14px"></i>
          Staff Architect
        </div>
      </div>
    </div>

    <div class="hud sidebar">
      <div class="nav-item active" data-tooltip="System Map">
        <i data-lucide="network"></i>
      </div>
      <div class="nav-item" data-tooltip="Event Mesh">
        <i data-lucide="zap"></i>
      </div>
      <div class="nav-item" data-tooltip="AI Orchestration">
        <i data-lucide="brain-circuit"></i>
      </div>
      <div class="nav-item" data-tooltip="Deployment Topology">
        <i data-lucide="box"></i>
      </div>
      <div class="nav-item" data-tooltip="Tech Debt Scan">
        <i data-lucide="stethoscope"></i>
      </div>
      <div style="margin-top: auto" class="nav-item">
        <i data-lucide="settings"></i>
      </div>
    </div>

    <div class="mode-label hud">
      <div class="mode-btn active" onclick="setMode('operational')">
        Operational
      </div>
      <div class="mode-btn" onclick="setMode('intelligence')">Intelligence</div>
      <div class="mode-btn" onclick="setMode('infra')">Infrastructure</div>
    </div>

    <div id="inspect-panel" class="inspect-panel">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 40px;
        "
      >
        <div
          class="status-badge"
          style="
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent-primary);
          "
        >
          INSPECTING NODE
        </div>
        <i
          data-lucide="x"
          style="cursor: pointer; width: 28px; color: #fff"
          onclick="closePanel()"
        ></i>
      </div>

      <div id="inspect-content"></div>
    </div>

    <script>
      // --- Architecture Intelligence Data ---
      lucide.createIcons();

      const state = {
        zoom: 0.6,
        pan: { x: window.innerWidth / 2 - 1000, y: 150 },
        selectedNode: null,
        particles: [],
        mode: "operational",
      };

      const layers = [
        { id: "edge", name: "Edge Gateway", y: 200 },
        { id: "mesh", name: "Event Mesh & Router", y: 800 },
        { id: "logic", name: "Domain Services", y: 1400 },
        { id: "persistence", name: "Global State", y: 2000 },
      ];

      const nodes = [
        {
          id: "lb",
          name: "Vercel Edge LB",
          type: "Ingress",
          layer: "edge",
          x: 1000,
          y: 200,
        },

        {
          id: "event_bus",
          name: "Mesh Event Bus",
          type: "Mesh",
          layer: "mesh",
          x: 800,
          y: 800,
          status: "healthy",
          logic: "mesh.ts",
        },
        {
          id: "ai_router",
          name: "Inference Router",
          type: "AI",
          layer: "mesh",
          x: 1200,
          y: 800,
          status: "healthy",
          logic: "router.ts",
        },
        {
          id: "dlq",
          name: "Dead Letter Queue",
          type: "Queue",
          layer: "mesh",
          x: 1600,
          y: 800,
          status: "warning",
        },

        {
          id: "auth",
          name: "Identity Service",
          type: "Auth",
          layer: "logic",
          x: 600,
          y: 1400,
        },
        {
          id: "repo_sync",
          name: "Repo Synchronizer",
          type: "Worker",
          layer: "logic",
          x: 1000,
          y: 1400,
          status: "warning",
        },
        {
          id: "ai_worker",
          name: "LLM Agent Pool",
          type: "Agent",
          layer: "logic",
          x: 1400,
          y: 1400,
        },

        {
          id: "postgres",
          name: "CockroachDB",
          type: "Postgres",
          layer: "persistence",
          x: 800,
          y: 2000,
        },
        {
          id: "redis",
          name: "Upstash Redis",
          type: "Cache",
          layer: "persistence",
          x: 1200,
          y: 2000,
        },
      ];

      const edges = [
        { from: "lb", to: "event_bus", label: "Emit Event" },
        { from: "lb", to: "ai_router", label: "AI Inference" },
        { from: "event_bus", to: "auth", label: "Auth Sub" },
        { from: "event_bus", to: "repo_sync", label: "Sync Sub" },
        {
          from: "event_bus",
          to: "dlq",
          label: "Retry Exhausted",
          type: "error",
        },
        { from: "ai_router", to: "ai_worker", label: "Delegate" },
        {
          from: "ai_router",
          to: "dlq",
          label: "Fallback Failed",
          type: "error",
        },
        { from: "repo_sync", to: "postgres", label: "Write" },
        { from: "ai_worker", to: "redis", label: "Cache Context" },
      ];

      // --- Core Engine ---
      const svgLayer = document.getElementById("svg-layer");
      const nodesGroup = document.getElementById("nodes");
      const edgesGroup = document.getElementById("edges");
      const baseGrid = document.getElementById("base-grid");

      function init() {
        // Draw Layers
        layers.forEach((l) => {
          const text = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "text",
          );
          text.setAttribute("x", 400);
          text.setAttribute("y", l.y + 100);
          text.setAttribute(
            "style",
            "fill: rgba(255,255,255,0.02); font-size: 80px; font-weight: 900; text-transform: uppercase; letter-spacing: 20px; pointer-events: none;",
          );
          text.textContent = l.name;
          baseGrid.appendChild(text);

          const line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line",
          );
          line.setAttribute("x1", 0);
          line.setAttribute("y1", l.y);
          line.setAttribute("x2", 4000);
          line.setAttribute("y2", l.y);
          line.setAttribute("stroke", "rgba(255,255,255,0.03)");
          line.setAttribute("stroke-width", "4");
          baseGrid.appendChild(line);
        });

        // Draw Edges
        edges.forEach((e) => {
          const from = nodes.find((n) => n.id === e.from);
          const to = nodes.find((n) => n.id === e.to);
          const path = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path",
          );
          const d = `M ${from.x} ${from.y + 60} C ${from.x} ${from.y + 150}, ${to.x} ${to.y - 150}, ${to.x} ${to.y - 60}`;
          path.setAttribute("d", d);
          path.setAttribute("class", `edge ${e.type || ""}`);
          path.setAttribute("id", `edge-${e.from}-${e.to}`);
          path.setAttribute("marker-end", "url(#arrow)");
          edgesGroup.appendChild(path);
        });

        // Draw Nodes
        nodes.forEach((n) => {
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.setAttribute("class", `node ${n.status || "healthy"}`);
          g.setAttribute("transform", `translate(${n.x}, ${n.y})`);
          g.setAttribute("id", `node-${n.id}`);

          const rect = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "rect",
          );
          rect.setAttribute("width", 280);
          rect.setAttribute("height", 120);
          rect.setAttribute("x", -140);
          rect.setAttribute("y", -60);

          const name = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "text",
          );
          name.setAttribute("text-anchor", "middle");
          name.setAttribute("y", -5);
          name.setAttribute(
            "style",
            "fill: #fff; font-size: 18px; font-weight: 700;",
          );
          name.textContent = n.name;

          const type = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "text",
          );
          type.setAttribute("text-anchor", "middle");
          type.setAttribute("y", 25);
          type.setAttribute(
            "style",
            "fill: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 2px;",
          );
          type.textContent = n.type;

          g.appendChild(rect);
          g.appendChild(name);
          g.appendChild(type);

          g.addEventListener("click", () => selectNode(n));
          nodesGroup.appendChild(g);
        });
      }

      function selectNode(node) {
        if (state.selectedNode)
          document
            .getElementById(`node-${state.selectedNode.id}`)
            .classList.remove("active");
        state.selectedNode = node;
        document.getElementById(`node-${node.id}`).classList.add("active");

        // Cinematic Viewport Move
        gsap.to(state.pan, {
          duration: 1.5,
          x: window.innerWidth / 2 - node.x * state.zoom,
          y: window.innerHeight / 2 - node.y * state.zoom,
          ease: "expo.inOut",
          onUpdate: updateTransform,
        });

        openPanel(node);
        pulseFlows(node);
      }

      function openPanel(node) {
        const panel = document.getElementById("inspect-panel");
        const content = document.getElementById("inspect-content");

        let extraContent = "";
        if (node.id === "ai_router") {
          extraContent = `
                    <div class="panel-section">
                        <label style="font-size: 11px; color: var(--accent-primary); letter-spacing: 2px;">FALLBACK LOGIC</label>
                        <div class="flow-monitor" style="margin-top: 15px;">
                            <div class="flow-step">
                                <div class="flow-status" style="background: var(--accent-danger);"></div>
                                <div>Primary: Claude-3-Sonnet (FAILED)</div>
                            </div>
                            <div class="flow-step">
                                <div class="flow-status" style="background: var(--accent-success);"></div>
                                <div>Fallback: GPT-4o (ACTIVE)</div>
                            </div>
                        </div>
                    </div>
                `;
        } else if (node.id === "event_bus") {
          extraContent = `
                    <div class="panel-section">
                        <label style="font-size: 11px; color: var(--accent-primary); letter-spacing: 2px;">RETRY SEMANTICS</label>
                        <div class="flow-monitor" style="margin-top: 15px;">
                            <div class="flow-step">
                                <div>Max Retries: 3</div>
                                <div style="margin-left: auto; color: var(--accent-warning);">Exponential Backoff</div>
                            </div>
                            <div class="flow-step">
                                <div>DLQ Routing: ENABLED</div>
                            </div>
                        </div>
                    </div>
                `;
        }

        content.innerHTML = `
                <div class="panel-section">
                    <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 10px;">${node.name}</h2>
                    <p style="color: var(--text-muted); font-size: 14px;">Operational logic defined in <code>${node.logic || "infra/core.tf"}</code></p>
                </div>

                <div class="metric-grid panel-section">
                    <div class="metric-card">
                        <label>Availability</label>
                        <span>99.999%</span>
                    </div>
                    <div class="metric-card">
                        <label>Latency</label>
                        <span>24ms</span>
                    </div>
                    <div class="metric-card">
                        <label>Throughput</label>
                        <span>12k/s</span>
                    </div>
                    <div class="metric-card">
                        <label>Health</label>
                        <span style="color: ${node.status === "warning" ? "var(--accent-warning)" : "var(--accent-success)"}">
                            ${node.status === "warning" ? "DEGRADED" : "OPTIMAL"}
                        </span>
                    </div>
                </div>

                ${extraContent}

                <div class="panel-section">
                    <button style="width: 100%; padding: 20px; background: var(--accent-primary); border: none; border-radius: 15px; font-weight: 800; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <i data-lucide="activity"></i> VIEW DISTRIBUTED TRACE
                    </button>
                </div>
            `;
        panel.classList.add("open");
        lucide.createIcons();
      }

      function closePanel() {
        document.getElementById("inspect-panel").classList.remove("open");
      }

      function pulseFlows(node) {
        document
          .querySelectorAll(".edge")
          .forEach((e) => e.classList.remove("highlight"));
        const outbound = edges.filter((e) => e.from === node.id);
        outbound.forEach((e) => {
          document
            .getElementById(`edge-${e.from}-${e.to}`)
            .classList.add("highlight");
          for (let i = 0; i < 5; i++) {
            setTimeout(() => spawnParticle(e), i * 150);
          }
        });
      }

      // --- Interaction ---
      function updateTransform() {
        gsap.set(svgLayer, {
          x: state.pan.x,
          y: state.pan.y,
          scale: state.zoom,
        });
      }

      const viewport = document.getElementById("viewport");
      Draggable.create(viewport, {
        onDrag: function () {
          state.pan.x = this.x;
          state.pan.y = this.y;
          updateTransform();
        },
      });

      viewport.addEventListener("wheel", (e) => {
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        state.zoom *= delta;
        updateTransform();
      });

      // --- Particles ---
      const canvas = document.getElementById("particle-layer");
      const ctx = canvas.getContext("2d");
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      function spawnParticle(edge) {
        const path = document.getElementById(`edge-${edge.from}-${edge.to}`);
        state.particles.push({
          path,
          progress: 0,
          speed: 0.005 + Math.random() * 0.005,
          color:
            edge.type === "error"
              ? "var(--accent-danger)"
              : "var(--accent-primary)",
        });
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        state.particles = state.particles.filter((p) => {
          p.progress += p.speed;
          if (p.progress >= 1) return false;
          const point = p.path.getPointAtLength(
            p.progress * p.path.getTotalLength(),
          );
          const x = point.x * state.zoom + state.pan.x;
          const y = point.y * state.zoom + state.pan.y;

          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.shadowBlur = 15;
          ctx.shadowColor = p.color;
          ctx.fill();
          return true;
        });
        requestAnimationFrame(animate);
      }

      init();
      updateTransform();
      animate();
    </script>
  </body>
</html>
